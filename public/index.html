    body {

    /* Hamburger menu icon */
    .hamburger div {
      width: 25px;
      height: 3px;
      background-color: white;
      margin: 5px 0;
      transition: all 0.3s ease;
    }
    /* Fade-in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Staggered fade-in for projects and skills */
    @keyframes fadeInStagger {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    .animate-stagger > div {
      animation: fadeInStagger 0.5s ease-out forwards;
    }
    .animate-stagger > div:nth-child(1) { animation-delay: 0.1s; }
    .animate-stagger > div:nth-child(2) { animation-delay: 0.2s; }
    .animate-stagger > div:nth-child(3) { animation-delay: 0.3s; }
    .animate-stagger > div:nth-child(4) { animation-delay: 0.4s; }
    .animate-stagger > div:nth-child(5) { animation-delay: 0.5s; }
    .animate-stagger > div:nth-child(6) { animation-delay: 0.6s; }
    .animate-stagger > div:nth-child(7) { animation-delay: 0.7s; }
    .animate-stagger > div:nth-child(8) { animation-delay: 0.8s; }
    .animate-stagger > div:nth-child(9) { animation-delay: 0.9s; }
    .animate-stagger > div:nth-child(10) { animation-delay: 1.0s; }
    .animate-stagger > div:nth-child(11) { animation-delay: 1.1s; }
    /* Bounce effect for contact icons */

    // Robustly suppress Babel Standalone warning
    (function() {
      const originalWarn = console.warn;
      console.warn = function(...args) {
        const message = args[0];
        if (typeof message === 'string' && 
            (message.includes('Babel transformer') || 
             message.includes('precompile your scripts'))) {
          return;
        }
        originalWarn.apply(console, args);
      };
    })();
